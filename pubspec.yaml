name: splitnova
description: "Split Smart. Tip Easy. — Bill & Tip Calculator"
publish_to: none
version: 1.0.0+4

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  get_storage: ^2.1.1
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.2
  package_info_plus: ^10.1.0
  speech_to_text: ^7.4.0
  share_plus: ^13.1.0
  url_launcher: ^6.2.5
  http: ^1.2.1
  html: ^0.15.4
  screenshot: ^3.0.0
  qr_flutter: ^4.1.0
  flutter_animate: ^4.5.0
  google_fonts: ^8.1.0
  flutter_screenutil: ^5.9.0
  intl: ^0.20.2
  flutter_svg: ^2.0.9
  fluttertoast: ^8.2.10
  curved_navigation_bar: ^1.0.3
  permission_handler: ^12.0.3
  flutter_launcher_icons: ^0.14.4
  saver_gallery: ^4.1.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#007A6E"
  adaptive_icon_foreground: "assets/images/app_logo.png"
  min_sdk_android: 21
